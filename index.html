<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>分析ダッシュボード｜ワンモア奥様 西船橋店</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root{--bg:#0d0f14;--bg2:#141720;--bg3:#1c2030;--bg4:#242840;--bdr:rgba(255,255,255,.07);--bdr2:rgba(255,255,255,.13);--tx:#e8eaf0;--tx2:#8b90a8;--tx3:#555a72;--ac:#5b7fff;--ac2:#7c9fff;--gn:#3dd68c;--am:#f5a623;--rd:#ff6b6b;--pu:#a78bfa;--mono:'DM Mono',monospace;--sans:'Noto Sans JP',sans-serif;}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--tx);font-family:var(--sans);font-weight:300;min-height:100vh;line-height:1.6}
a{color:var(--ac2);text-decoration:none}
.hdr{background:var(--bg2);border-bottom:1px solid var(--bdr);padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;height:54px;position:sticky;top:0;z-index:100;gap:1rem}
.hdr-title{font-size:12px;font-weight:500;letter-spacing:.08em;color:var(--tx2);text-transform:uppercase;white-space:nowrap}
.dot{width:7px;height:7px;border-radius:50%;background:var(--gn);display:inline-block;margin-right:7px;animation:pulse 2s infinite}
.tabs{display:flex;gap:2px;background:var(--bg3);border-radius:10px;padding:3px;margin:1.25rem 0 1rem}
.tab{flex:1;text-align:center;padding:8px 4px;font-size:12px;font-weight:500;border-radius:8px;cursor:pointer;transition:all .15s;color:var(--tx3)}
.tab.on{background:var(--bg2);color:var(--tx);box-shadow:0 1px 4px rgba(0,0,0,.3)}
.btn{border-radius:8px;font-family:var(--sans);font-size:13px;font-weight:500;cursor:pointer;padding:9px 18px;transition:all .15s;white-space:nowrap;display:inline-flex;align-items:center;gap:6px;border:none;line-height:1}
.btn-p{background:var(--ac);color:#fff}.btn-p:hover{background:#4a6ee8}.btn-p:active{transform:scale(.97)}
.btn-g{background:transparent;color:var(--tx2);border:1px solid var(--bdr2)!important}.btn-g:hover{border-color:var(--ac2)!important;color:var(--tx)}
.btn-rd{background:rgba(255,107,107,.12);color:var(--rd);border:1px solid rgba(255,107,107,.2)!important}
.btn-sm{padding:6px 12px;font-size:12px}
.wrap{max-width:1080px;margin:0 auto;padding:0 1.25rem 2rem}
.card{background:var(--bg2);border:1px solid var(--bdr);border-radius:12px;padding:1.1rem 1.25rem;margin-bottom:1rem}
.card-title{font-size:11px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--tx3);margin-bottom:.9rem}
.sec{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--tx3);margin-bottom:.65rem;padding-bottom:.45rem;border-bottom:1px solid var(--bdr);margin-top:1.25rem}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-bottom:1.25rem}
.mc{background:var(--bg2);border:1px solid var(--bdr);border-radius:12px;padding:1rem 1.2rem;position:relative;overflow:hidden}
.mc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--ca,var(--ac)),transparent)}
.mc.gn{--ca:var(--gn)}.mc.am{--ca:var(--am)}.mc.pu{--ca:var(--pu)}
.mc-lbl{font-size:10px;color:var(--tx3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:5px}
.mc-val{font-family:var(--mono);font-size:28px;font-weight:500;color:var(--tx);line-height:1}
.mc-unit{font-size:11px;color:var(--tx3);margin-left:3px}
.mc-sub{font-size:11px;color:var(--tx3);margin-top:4px}
.up{color:var(--gn)}.dn{color:var(--rd)}
.charts2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1.25rem}
@media(max-width:640px){.charts2{grid-template-columns:1fr}}
.cc{background:var(--bg2);border:1px solid var(--bdr);border-radius:12px;padding:1.2rem}
.cc-sub{font-size:10px;color:var(--tx3);margin-bottom:.7rem;text-transform:uppercase;letter-spacing:.06em}
.tcard{background:var(--bg2);border:1px solid var(--bdr);border-radius:12px;overflow:hidden;margin-bottom:1rem}
.ttbar{padding:.8rem 1.2rem;border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.ttbar select,.ttbar input{background:var(--bg3);border:1px solid var(--bdr2);border-radius:6px;color:var(--tx);font-size:12px;padding:5px 9px;outline:none}
.ttbar input{font-family:var(--sans);width:120px}.ttbar select:focus,.ttbar input:focus{border-color:var(--ac)}
.tcnt{margin-left:auto;font-size:11px;color:var(--tx3);font-family:var(--mono)}
.tscroll{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
thead th{background:var(--bg3);color:var(--tx3);font-weight:500;font-size:10px;letter-spacing:.05em;text-transform:uppercase;padding:9px 13px;text-align:left;border-bottom:1px solid var(--bdr);white-space:nowrap}
tbody tr{border-bottom:1px solid var(--bdr);transition:background .12s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--bg3)}
td{padding:8px 13px;color:var(--tx2);vertical-align:middle}
.nm{color:var(--tx);font-weight:500}.dt{font-family:var(--mono);font-size:11px;color:var(--tx3)}.sp{font-family:var(--mono);font-size:11px}.ag{font-family:var(--mono)}
.cup{display:inline-block;font-family:var(--mono);font-size:10px;padding:2px 5px;border-radius:4px;font-weight:500}
.cup-I,.cup-H{background:rgba(255,107,107,.15);color:#ff9999}
.cup-G{background:rgba(245,166,35,.15);color:#f5c060}
.cup-F,.cup-E{background:rgba(91,127,255,.15);color:#7c9fff}
.cup-D,.cup-C,.cup-B{background:var(--bg4);color:var(--tx3)}
.ntag{font-size:9px;padding:2px 6px;border-radius:10px;background:rgba(61,214,140,.1);color:var(--gn);border:1px solid rgba(61,214,140,.2);margin-left:5px;vertical-align:middle}
.month-sel-row{display:flex;gap:8px;align-items:center;margin-bottom:1rem;flex-wrap:wrap}
.report-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1rem}
@media(max-width:500px){.report-grid{grid-template-columns:1fr}}
.rstat{background:var(--bg3);border-radius:8px;padding:.9rem 1rem;border:1px solid var(--bdr)}
.rstat-lbl{font-size:10px;color:var(--tx3);letter-spacing:.05em;text-transform:uppercase;margin-bottom:4px}
.rstat-val{font-family:var(--mono);font-size:22px;font-weight:500;color:var(--tx)}
.rstat-sub{font-size:11px;color:var(--tx3);margin-top:3px}
.pager{display:flex;align-items:center;gap:5px;padding:.75rem 1.2rem;border-top:1px solid var(--bdr);justify-content:center;flex-wrap:wrap}
.pg{background:var(--bg3);border:1px solid var(--bdr);border-radius:6px;color:var(--tx2);font-size:12px;padding:4px 9px;cursor:pointer;transition:border-color .12s,color .12s}
.pg:hover,.pg.on{border-color:var(--ac);color:var(--ac)}.pg:disabled{opacity:.35;cursor:default}
.pi{font-family:var(--mono);font-size:11px;color:var(--tx3);margin:0 3px}
.loading{text-align:center;padding:3rem;color:var(--tx3);font-size:13px}
footer{border-top:1px solid var(--bdr);padding:1rem 1.5rem;font-size:11px;color:var(--tx3);font-family:var(--mono);display:flex;justify-content:space-between;flex-wrap:wrap;gap:6px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes fadein{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:translateY(0)}}
.fade{animation:fadein .25s ease forwards}
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-title"><span class="dot"></span>ワンモア奥様 西船橋店 — 分析ダッシュボード</div>
  <div style="font-family:var(--mono);font-size:11px;color:var(--tx3)" id="hdrInfo">読込中...</div>
</header>

<div class="wrap">
  <div class="tabs">
    <div class="tab on"  onclick="showTab('daily')">📅 日次記録</div>
    <div class="tab"     onclick="showTab('report')">📈 月次レポート</div>
    <div class="tab"     onclick="showTab('overview')">📊 入店概要</div>
    <div class="tab"     onclick="showTab('casts')">👥 入店者</div>
  </div>

  <!-- ══ 日次記録 ══ -->
  <div id="tab-daily">
    <div class="card">
      <div class="card-title">更新方法</div>
      <div style="font-size:12px;color:var(--tx2);line-height:1.9">
        親機（更新担当PC）で <a href="https://onemore-nishifuna.com/girls" target="_blank" rel="noopener">girlsページ</a> を開き、画面右下の <strong style="color:var(--gn)">「📊 在籍・出勤を記録」</strong> ボタンを押すと自動でデータが更新されます。
      </div>
      <div style="display:flex;gap:8px;margin-top:.75rem;flex-wrap:wrap">
        <button class="btn btn-p" onclick="loadData()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
          最新データを読み込む
        </button>
        <button class="btn btn-g btn-sm" onclick="exportDailyCSV()">CSV出力</button>
      </div>
      <div style="font-size:11px;color:var(--tx3);font-family:var(--mono);margin-top:.5rem" id="loadStatus">● データを読み込んでいます...</div>
    </div>

    <div class="sec" style="margin-top:.25rem">記録履歴</div>
    <div class="tcard">
      <div class="ttbar">
        <select id="dailyFilterMonth" onchange="renderDailyTable()"><option value="">全期間</option></select>
        <span class="tcnt" id="dailyCnt">— 件</span>
      </div>
      <div class="tscroll">
        <table>
          <thead><tr><th>日付</th><th>曜日</th><th>総在籍</th><th>出勤数</th><th>出勤率</th></tr></thead>
          <tbody id="dailyTbody"><tr><td colspan="5" class="loading">読込中...</td></tr></tbody>
        </table>
      </div>
      <div class="pager" id="dailyPager"></div>
    </div>
  </div>

  <!-- ══ 月次レポート ══ -->
  <div id="tab-report" style="display:none">
    <div class="month-sel-row">
      <select id="reportMonth" onchange="renderReport()" style="background:var(--bg3);border:1px solid var(--bdr2);border-radius:8px;color:var(--tx);font-size:13px;padding:7px 12px;outline:none"><option value="">月を選択</option></select>
      <button class="btn btn-p" onclick="renderReport()">📊 レポート表示</button>
      <button class="btn btn-g btn-sm" onclick="exportMonthCSV()">CSV出力</button>
    </div>
    <div id="reportContent"><div class="loading">月を選んでください</div></div>
  </div>

  <!-- ══ 入店概要 ══ -->
  <div id="tab-overview" style="display:none">
    <div class="metrics" id="ov-metrics"></div>
    <div class="sec" style="margin-top:0">月別トレンド（在籍 / 出勤 / 入店）</div>
    <div class="cc" style="margin-bottom:1.25rem"><div style="position:relative;height:200px"><canvas id="cTrend"></canvas></div></div>
    <div class="charts2">
      <div class="cc"><div class="cc-sub">月別平均出勤率</div><div style="position:relative;height:160px"><canvas id="cRate"></canvas></div></div>
      <div class="cc"><div class="cc-sub">カップ別分布</div><div style="position:relative;height:160px"><canvas id="cCup"></canvas></div></div>
    </div>
    <div class="sec">年齢帯（入店者）</div>
    <div id="ageGrid" style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1.25rem"></div>
  </div>

  <!-- ══ 入店者 ══ -->
  <div id="tab-casts" style="display:none">
    <div class="tcard">
      <div class="ttbar">
        <input type="text" id="castSrch" placeholder="名前で検索..." oninput="filtCasts()">
        <select id="castSrt" onchange="filtCasts()">
          <option value="dd">入店日 新しい順</option>
          <option value="da">入店日 古い順</option>
          <option value="aa">年齢 若い順</option>
          <option value="ad">年齢 高い順</option>
        </select>
        <button class="btn btn-g btn-sm" onclick="exportCastCSV()">CSV出力</button>
        <span class="tcnt" id="castCnt">— 件</span>
      </div>
      <div class="tscroll">
        <table>
          <thead><tr><th>入店日</th><th>名前</th><th>年齢</th><th>身長</th><th>バスト</th><th>W</th><th>H</th><th>プロフィール</th></tr></thead>
          <tbody id="castTbody"><tr><td colspan="8" class="loading">読込中...</td></tr></tbody>
        </table>
      </div>
      <div class="pager" id="castPager"></div>
    </div>
  </div>
</div>

<footer>
  <span>ワンモア奥様 西船橋店 分析ダッシュボード</span>
  <span id="fDate">—</span>
</footer>

<script>
const REPO = 'jsection1106-dotcom/nf-a8x3k2';
const DATA_URL = `https://raw.githubusercontent.com/${REPO}/main/data.json`;
const DOW = ['日','月','火','水','木','金','土'];
const CS = 20;

let dailyData=[], castsData=[], filtCastsData=[], castPg=1, dailyFiltData=[], dailyPg=1;
let trendChart=null, rateChart=null, cupChart=null;

// ── データ読込（GitHub raw） ──
async function loadData(){
  document.getElementById('loadStatus').textContent='● データを取得中...';
  try{
    const res = await fetch(DATA_URL + '?t=' + Date.now());
    if(!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    dailyData = (data.daily || []).sort((a,b)=>b.date.localeCompare(a.date));
    castsData = (data.casts || []).sort((a,b)=>b.date.localeCompare(a.date));
    renderAll();
    document.getElementById('loadStatus').textContent=`● 最終更新: ${data.updated||'—'} / 在籍記録${dailyData.length}日 / 入店者${castsData.length}名`;
    document.getElementById('hdrInfo').textContent=`在籍記録${dailyData.length}日 / 入店者${castsData.length}名`;
    document.getElementById('fDate').textContent='loaded: '+new Date().toLocaleString('ja-JP');
  }catch(e){
    document.getElementById('loadStatus').textContent='● 読込失敗: '+e.message;
  }
}

// ── Tabs ──
function showTab(id){
  ['daily','report','overview','casts'].forEach(t=>{document.getElementById('tab-'+t).style.display=t===id?'':'none';});
  document.querySelectorAll('.tab').forEach((el,i)=>{el.classList.toggle('on',['daily','report','overview','casts'][i]===id);});
  if(id==='overview')renderOverview();
  if(id==='report')populateReportMonths();
  if(id==='daily'){populateMonthFilter();renderDailyTable();}
  if(id==='casts')filtCasts();
}

function renderAll(){
  populateMonthFilter(); renderDailyTable();
  filtCasts();
}

// ── 日次記録 ──
function populateMonthFilter(){
  const months=[...new Set(dailyData.map(d=>d.date.slice(0,7)))].sort().reverse();
  const sel=document.getElementById('dailyFilterMonth'),cur=sel.value;
  sel.innerHTML='<option value="">全期間</option>'+months.map(m=>`<option value="${m}" ${m===cur?'selected':''}>${m}</option>`).join('');
}
function renderDailyTable(){
  const mf=document.getElementById('dailyFilterMonth').value;
  dailyFiltData=mf?dailyData.filter(d=>d.date.startsWith(mf)):[...dailyData];
  document.getElementById('dailyCnt').textContent=dailyFiltData.length+' 件';
  dailyPg=1;renderDailyPage();
}
function renderDailyPage(){
  const st=(dailyPg-1)*CS,page=dailyFiltData.slice(st,st+CS);
  if(!page.length){document.getElementById('dailyTbody').innerHTML='<tr><td colspan="5" class="loading">データなし</td></tr>';return;}
  document.getElementById('dailyTbody').innerHTML=page.map(d=>{
    const dt=new Date(d.date),dow=DOW[dt.getDay()];
    const rate=d.total&&d.working?(d.working/d.total*100).toFixed(1)+'%':'—';
    const rc=d.total&&d.working?(d.working/d.total>=0.5?'var(--gn)':d.working/d.total>=0.3?'var(--am)':'var(--rd)'):'var(--tx3)';
    return `<tr class="fade"><td class="dt">${d.date}</td><td style="color:${[0,6].includes(dt.getDay())?'var(--rd)':'var(--tx2)'};font-size:12px">${dow}</td><td style="font-family:var(--mono)">${d.total??'—'}</td><td style="font-family:var(--mono)">${d.working??'—'}</td><td style="font-family:var(--mono);color:${rc}">${rate}</td></tr>`;
  }).join('');
  renderPager('dailyPager',dailyFiltData.length,dailyPg,n=>{dailyPg=n;renderDailyPage();});
}

// ── 入店概要 ──
function renderOverview(){
  const now=new Date();
  const ym=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const lm=`${now.getMonth()===0?now.getFullYear()-1:now.getFullYear()}-${String(now.getMonth()===0?12:now.getMonth()).padStart(2,'0')}`;
  const thisD=dailyData.filter(d=>d.date.startsWith(ym)),lastD=dailyData.filter(d=>d.date.startsWith(lm));
  const avg=(arr,k)=>{const r=arr.filter(d=>d[k]!=null);return r.length?Math.round(r.reduce((s,d)=>s+d[k],0)/r.length):null;};
  const atm=avg(thisD,'total'),alm=avg(lastD,'total'),wtm=avg(thisD,'working'),wlm=avg(lastD,'working');
  const thisNF=castsData.filter(d=>d.date.startsWith(ym)).length;
  const fn=(a,b)=>{if(a==null||b==null)return'';const d=a-b;return d>=0?`<span class="up">↑ +${d}</span>`:`<span class="dn">↓ ${d}</span>`;};
  document.getElementById('ov-metrics').innerHTML=`
    <div class="mc"><div class="mc-lbl">今月 平均在籍</div><div class="mc-val">${atm??'—'}<span class="mc-unit">名</span></div><div class="mc-sub">${fn(atm,alm)||'先月比'}</div></div>
    <div class="mc gn"><div class="mc-lbl">今月 平均出勤</div><div class="mc-val">${wtm??'—'}<span class="mc-unit">名</span></div><div class="mc-sub">${fn(wtm,wlm)||'先月比'}</div></div>
    <div class="mc am"><div class="mc-lbl">今月 入店数</div><div class="mc-val">${thisNF}<span class="mc-unit">名</span></div><div class="mc-sub">累計 ${castsData.length}名</div></div>
    <div class="mc pu"><div class="mc-lbl">記録日数</div><div class="mc-val">${dailyData.length}<span class="mc-unit">日</span></div><div class="mc-sub">今月 ${thisD.length}日</div></div>
  `;
  document.getElementById('hdrInfo').textContent=`在籍${atm??'—'}名avg / 出勤${wtm??'—'}名avg / 累計${castsData.length}名`;
  const months=[...new Set([...dailyData.map(d=>d.date.slice(0,7)),...castsData.map(d=>d.date.slice(0,7))])].sort();
  const ml=months.map(m=>{const[y,mo]=m.split('-');return`${y.slice(2)}/${mo}`;});
  const mt=months.map(m=>{const r=dailyData.filter(d=>d.date.startsWith(m)&&d.total!=null);return r.length?Math.round(r.reduce((s,d)=>s+d.total,0)/r.length):null;});
  const mw=months.map(m=>{const r=dailyData.filter(d=>d.date.startsWith(m)&&d.working!=null);return r.length?Math.round(r.reduce((s,d)=>s+d.working,0)/r.length):null;});
  const mn=months.map(m=>castsData.filter(d=>d.date.startsWith(m)).length);
  if(trendChart)trendChart.destroy();
  trendChart=new Chart(document.getElementById('cTrend'),{type:'line',data:{labels:ml,datasets:[
    {label:'平均在籍',data:mt,borderColor:'#5b7fff',backgroundColor:'rgba(91,127,255,.08)',tension:.3,spanGaps:true,pointRadius:3},
    {label:'平均出勤',data:mw,borderColor:'#3dd68c',backgroundColor:'rgba(61,214,140,.08)',tension:.3,spanGaps:true,pointRadius:3},
    {label:'入店数',data:mn,borderColor:'#f5a623',backgroundColor:'rgba(245,166,35,.08)',tension:.3,pointRadius:3,type:'bar',yAxisID:'y2'},
  ]},options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},
    plugins:{legend:{labels:{color:'#8b90a8',font:{size:11},boxWidth:10}}},
    scales:{x:{ticks:{color:'#555a72',font:{size:10},autoSkip:false,maxRotation:45},grid:{color:'rgba(255,255,255,.03)'},border:{color:'#242840'}},
            y:{ticks:{color:'#555a72',font:{size:10}},grid:{color:'rgba(255,255,255,.04)'},border:{display:false}},
            y2:{position:'right',ticks:{color:'#555a72',font:{size:10},stepSize:1},grid:{display:false},border:{display:false},beginAtZero:true}}}});
  const mr=months.map(m=>{const r=dailyData.filter(d=>d.date.startsWith(m)&&d.total&&d.working);return r.length?Math.round(r.reduce((s,d)=>s+d.working/d.total*100,0)/r.length):null;});
  if(rateChart)rateChart.destroy();
  rateChart=new Chart(document.getElementById('cRate'),{type:'bar',data:{labels:ml,datasets:[{data:mr,backgroundColor:mr.map(v=>v==null?'#555a72':v>=50?'rgba(61,214,140,.7)':v>=30?'rgba(245,166,35,.7)':'rgba(255,107,107,.7)'),borderRadius:4,borderSkipped:false}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
      scales:{x:{ticks:{color:'#555a72',font:{size:10},autoSkip:false,maxRotation:45},grid:{display:false},border:{color:'#242840'}},
              y:{ticks:{color:'#555a72',font:{size:10},callback:v=>v+'%'},grid:{color:'rgba(255,255,255,.04)'},border:{display:false},beginAtZero:true,max:100}}}});
  const cm={};for(const d of castsData)cm[d.cup]=(cm[d.cup]||0)+1;
  const co=['B','C','D','E','F','G','H','I','J'],cl=co.filter(x=>cm[x]);
  const cc={B:'#555a72',C:'#666b85',D:'#778099',E:'#5b7fff',F:'#5b7fff',G:'#f5a623',H:'#ff6b6b',I:'#ff6b6b',J:'#ff4444'};
  if(cupChart)cupChart.destroy();
  cupChart=new Chart(document.getElementById('cCup'),{type:'bar',data:{labels:cl,datasets:[{data:cl.map(x=>cm[x]),backgroundColor:cl.map(x=>cc[x]||'#5b7fff'),borderRadius:4,borderSkipped:false}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
      scales:{x:{ticks:{color:'#555a72',font:{size:11}},grid:{display:false},border:{color:'#242840'}},
              y:{ticks:{color:'#555a72',font:{size:10},stepSize:1},grid:{color:'rgba(255,255,255,.04)'},border:{display:false},beginAtZero:true}}}});
  const bs=[{l:'20代',mn:20,mx:30},{l:'30代',mn:30,mx:40},{l:'40代',mn:40,mx:50},{l:'50代+',mn:50,mx:999}];
  for(const b of bs)b.c=castsData.filter(d=>d.age>=b.mn&&d.age<b.mx).length;
  const bm2=Math.max(...bs.map(b=>b.c),1),tt=castsData.length||1;
  document.getElementById('ageGrid').innerHTML=bs.map(b=>`<div style="background:var(--bg2);border:1px solid var(--bdr);border-radius:8px;padding:.75rem 1rem;display:flex;align-items:center;gap:10px"><div style="font-family:var(--mono);font-size:12px;color:var(--tx2);width:38px;flex-shrink:0">${b.l}</div><div style="flex:1;background:var(--bg4);border-radius:3px;height:5px;overflow:hidden"><div style="height:100%;border-radius:3px;background:var(--ac);width:${Math.round(b.c/bm2*100)}%"></div></div><div style="font-family:var(--mono);font-size:12px;color:var(--tx);width:24px;text-align:right">${b.c}</div><div style="font-size:11px;color:var(--tx3);width:32px;text-align:right">${Math.round(b.c/tt*100)}%</div></div>`).join('');
}

// ── 月次レポート ──
function populateReportMonths(){
  const months=[...new Set([...dailyData.map(d=>d.date.slice(0,7)),...castsData.map(d=>d.date.slice(0,7))])].sort().reverse();
  const sel=document.getElementById('reportMonth'),cur=sel.value||months[0]||'';
  sel.innerHTML='<option value="">月を選択</option>'+months.map(m=>`<option value="${m}" ${m===cur?'selected':''}>${m}</option>`).join('');
  if(!sel.value&&months[0])sel.value=months[0];
}
function renderReport(){
  const m=document.getElementById('reportMonth').value;
  if(!m){document.getElementById('reportContent').innerHTML='<div class="loading">月を選んでください</div>';return;}
  const dd=dailyData.filter(d=>d.date.startsWith(m)),cd=castsData.filter(d=>d.date.startsWith(m));
  const wT=dd.filter(d=>d.total!=null),wW=dd.filter(d=>d.working!=null),wB=dd.filter(d=>d.total&&d.working);
  const avgT=wT.length?Math.round(wT.reduce((s,d)=>s+d.total,0)/wT.length):null;
  const avgW=wW.length?Math.round(wW.reduce((s,d)=>s+d.working,0)/wW.length):null;
  const avgR=wB.length?(wB.reduce((s,d)=>s+d.working/d.total*100,0)/wB.length).toFixed(1):null;
  const maxT=wT.length?Math.max(...wT.map(d=>d.total)):null,minT=wT.length?Math.min(...wT.map(d=>d.total)):null;
  const maxW=wW.length?Math.max(...wW.map(d=>d.working)):null,minW=wW.length?Math.min(...wW.map(d=>d.working)):null;
  const dowA=DOW.map((label,i)=>{const r=wB.filter(d=>new Date(d.date).getDay()===i);return{label,avg:r.length?(r.reduce((s,d)=>s+d.working,0)/r.length).toFixed(1):null,cnt:r.length};});
  const rows=dd.map(d=>{const dt=new Date(d.date),dow=DOW[dt.getDay()];const rate=d.total&&d.working?(d.working/d.total*100).toFixed(1)+'%':'—';return`<tr><td class="dt">${d.date}</td><td style="color:${[0,6].includes(dt.getDay())?'var(--rd)':'var(--tx2)'};font-size:12px">${dow}</td><td style="font-family:var(--mono)">${d.total??'—'}</td><td style="font-family:var(--mono)">${d.working??'—'}</td><td style="font-family:var(--mono)">${rate}</td></tr>`;}).join('');
  document.getElementById('reportContent').innerHTML=`
    <div style="font-size:15px;font-weight:500;color:var(--tx);margin-bottom:1rem">${m} 月次レポート</div>
    <div class="report-grid">
      <div class="rstat"><div class="rstat-lbl">平均総在籍</div><div class="rstat-val">${avgT??'—'}<span style="font-size:13px;color:var(--tx3);margin-left:3px">名</span></div><div class="rstat-sub">最大${maxT??'—'} / 最小${minT??'—'}</div></div>
      <div class="rstat"><div class="rstat-lbl">平均出勤数</div><div class="rstat-val">${avgW??'—'}<span style="font-size:13px;color:var(--tx3);margin-left:3px">名</span></div><div class="rstat-sub">最大${maxW??'—'} / 最小${minW??'—'}</div></div>
      <div class="rstat"><div class="rstat-lbl">平均出勤率</div><div class="rstat-val">${avgR??'—'}<span style="font-size:13px;color:var(--tx3);margin-left:3px">%</span></div><div class="rstat-sub">記録${wB.length}日分</div></div>
      <div class="rstat"><div class="rstat-lbl">入店数</div><div class="rstat-val">${cd.length}<span style="font-size:13px;color:var(--tx3);margin-left:3px">名</span></div><div class="rstat-sub">記録日数 ${dd.length}日</div></div>
    </div>
    <div class="sec">曜日別 平均出勤数</div>
    <div style="display:flex;gap:6px;margin-bottom:1.25rem;flex-wrap:wrap">
      ${dowA.map(d=>`<div style="flex:1;min-width:56px;background:var(--bg3);border:1px solid var(--bdr);border-radius:8px;padding:.6rem .5rem;text-align:center"><div style="font-size:11px;color:var(--tx3);margin-bottom:3px">${d.label}</div><div style="font-family:var(--mono);font-size:18px;font-weight:500;color:${d.cnt?'var(--tx)':'var(--tx3)'}">${d.avg??'—'}</div><div style="font-size:10px;color:var(--tx3);margin-top:1px">${d.cnt}日</div></div>`).join('')}
    </div>
    ${cd.length?`<div class="sec">今月の入店者（${cd.length}名）</div><div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:1.25rem">${cd.map(d=>`<a href="${d.url||'#'}" target="_blank" rel="noopener" style="background:var(--bg3);border:1px solid var(--bdr);border-radius:6px;padding:5px 10px;font-size:12px;color:var(--tx2);display:inline-flex;flex-direction:column;align-items:center;gap:2px"><span style="color:var(--tx);font-weight:500">${d.name}</span><span style="font-size:10px">${d.age}歳</span></a>`).join('')}</div>`:''}
    ${dd.length?`<div class="sec">日別データ</div><div class="tscroll" style="border:1px solid var(--bdr);border-radius:8px;overflow:hidden"><table><thead><tr><th>日付</th><th>曜日</th><th>在籍</th><th>出勤</th><th>出勤率</th></tr></thead><tbody>${rows}</tbody></table></div>`:'<div class="loading">この月の日次記録がありません</div>'}
  `;
}

// ── 入店者 ──
function filtCasts(){
  const q=document.getElementById('castSrch').value.trim().toLowerCase(),s=document.getElementById('castSrt').value;
  filtCastsData=castsData.filter(d=>!q||d.name.toLowerCase().includes(q));
  filtCastsData.sort((a,b)=>s==='da'?a.date.localeCompare(b.date):s==='aa'?a.age-b.age:s==='ad'?b.age-a.age:b.date.localeCompare(a.date));
  castPg=1;document.getElementById('castCnt').textContent=filtCastsData.length+' 件';renderCastPage();
}
function renderCastPage(){
  const st=(castPg-1)*CS,page=filtCastsData.slice(st,st+CS);
  const a30=new Date(Date.now()-30*864e5).toISOString().slice(0,10);
  if(!page.length){document.getElementById('castTbody').innerHTML='<tr><td colspan="8" class="loading">データなし</td></tr>';return;}
  document.getElementById('castTbody').innerHTML=page.map(d=>`<tr class="fade"><td class="dt">${d.date}</td><td class="nm">${d.name}${d.date>=a30?'<span class="ntag">NEW</span>':''}</td><td class="ag">${d.age}</td><td class="sp">${d.h?d.h+'cm':'—'}</td><td><span class="cup cup-${d.cup}">${d.b}(${d.cup})</span></td><td class="sp">${d.w??'—'}</td><td class="sp">${d.hip??'—'}</td><td>${d.url?`<a href="${d.url}" target="_blank" rel="noopener" style="font-size:11px;color:var(--ac2)">→ 詳細</a>`:'—'}</td></tr>`).join('');
  renderPager('castPager',filtCastsData.length,castPg,n=>{castPg=n;renderCastPage();});
}

// ── CSV ──
function exportDailyCSV(){const rows=dailyData.map(d=>[d.date,DOW[new Date(d.date).getDay()],d.total??'',d.working??'',d.total&&d.working?(d.working/d.total*100).toFixed(1)+'%':'']);dl([['日付','曜日','総在籍','出勤数','出勤率'],...rows],'nishifuna_daily');}
function exportMonthCSV(){const m=document.getElementById('reportMonth').value;if(!m)return;const rows=dailyData.filter(d=>d.date.startsWith(m)).map(d=>[d.date,DOW[new Date(d.date).getDay()],d.total??'',d.working??'',d.total&&d.working?(d.working/d.total*100).toFixed(1)+'%':'']);dl([['日付','曜日','総在籍','出勤数','出勤率'],...rows],`nishifuna_${m}`);}
function exportCastCSV(){const rows=castsData.map(d=>[d.date,d.name,d.age,d.h,d.b,d.cup,d.w,d.hip,d.url||'']);dl([['入店日','名前','年齢','身長','バスト','カップ','ウエスト','ヒップ','URL'],...rows],'nishifuna_casts');}
function dl(rows,name){const csv=rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');const a=document.createElement('a');a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'}));a.download=`${name}_${new Date().toISOString().slice(0,10)}.csv`;a.click();}

function renderPager(id,total,cur,cb){
  const tot=Math.ceil(total/CS);if(tot<=1){document.getElementById(id).innerHTML='';return;}
  let h=`<button class="pg" onclick="(${cb.toString()})(${cur-1})" ${cur===1?'disabled':''}>‹</button>`;
  for(let i=1;i<=tot;i++){if(i===1||i===tot||Math.abs(i-cur)<=2)h+=`<button class="pg ${i===cur?'on':''}" onclick="(${cb.toString()})(${i})">${i}</button>`;else if(Math.abs(i-cur)===3)h+=`<span class="pi">…</span>`;}
  h+=`<button class="pg" onclick="(${cb.toString()})(${cur+1})" ${cur===tot?'disabled':''}>›</button><span class="pi">${cur}/${tot}</span>`;
  document.getElementById(id).innerHTML=h;
}

// 起動時にデータ読込
loadData();
</script>
